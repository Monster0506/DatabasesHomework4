{% extends "base.html" %}

{% block title %}Add Department - Student Management{% endblock %}

{% block content %}
<h2>Add New Department</h2>

<form action="{{ url_for('add_department') }}" method="POST">
    <div class="form-group">
        <label for="dept_name">Department Name *</label>
        <input type="text" id="dept_name" name="dept_name" required>
    </div>
    
    <div class="form-group">
        <label for="building">Building</label>
        <input type="text" id="building" name="building" placeholder="e.g., Taylor Hall">
    </div>
    
    <div class="form-group">
        <label for="budget">Budget</label>
        <input type="number" id="budget" name="budget" step="0.01" min="0" placeholder="0.00">
    </div>
    
    <button type="submit">Add Department</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
