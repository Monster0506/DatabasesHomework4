{% extends "base.html" %}

{% block title %}Add Student - Student Management{% endblock %}

{% block content %}
<h2>Add New Student</h2>

<form action="{{ url_for('add_student') }}" method="POST">
    <div class="form-group">
        <label for="student_id">Student ID *</label>
        <input type="text" id="student_id" name="student_id" required>
    </div>

    <div class="form-group">
        <label for="name">Name *</label>
        <input type="text" id="name" name="name" required>
    </div>

    <div class="form-group">
        <label for="dept_name">Department Name *</label>
        <select id="dept_name" name="dept_name" required>
            <option value="">Select a department</option>
            {% for dept in departments %}
            <option value="{{ dept }}">{{ dept }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label>
            <input type="checkbox" id="is_transfer" name="is_transfer" onchange="toggleTransferCredits()">
            Transfer Student
        </label>
    </div>

    <div class="form-group" id="transfer_credits_group" style="display: none;">
        <label for="tot_cred">Initial Total Credits</label>
        <input type="number" id="tot_cred" name="tot_cred" min="0" value="0">
    </div>

    <button type="submit">Add Student</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
</form>

<script>
    function toggleTransferCredits() {
        const checkbox = document.getElementById('is_transfer');
        const creditsGroup = document.getElementById('transfer_credits_group');
        if (checkbox.checked) {
            creditsGroup.style.display = 'block';
        } else {
            creditsGroup.style.display = 'none';
            document.getElementById('tot_cred').value = '0';
        }
    }
</script>
{% endblock %}
